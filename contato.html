<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Exemplo</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/tsparticles-engine@2/tsparticles.engine.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tsparticles-basic@2/tsparticles.basic.min.js"></script>
    <script defer
        src="https://cdn.jsdelivr.net/npm/tsparticles-interaction-external-repulse@2/tsparticles.interaction.external.repulse.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tsparticles-shape-star@2/tsparticles.shape.star.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tsparticles-shape-image@2/tsparticles.shape.image.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
</head>

<body>

    <div class="content-wrapper">
        <header class="hero">
            <h1 class="glossy-text" style="font-size: 3rem;">Exemplo</h1>
            <p class="subtitle">Exemplo</p>
        </header>
        <div class="contact-grid">
            <div class="bubble-card">
                <div class="bloom"></div>
                <h3>Exemplo</h3>
                <p>Exemplo</p>
            </div>

            <div class="bubble-card">
                <div class="bloom"></div>
                <h3>Exemplo</h3>
                <p>Exemplo</p>
            </div>

            <div class="bubble-card">
                <div class="bloom"></div>
                <h3>Exemplo</h3>
                <p>Exemplo</p>
            </div>

            <div class="bubble-card">
                <div class="bloom"></div>
                <h3>Exemplo</h3>
                <p>Exemplo</p>
            </div>
        </div>
        <div class="glass-card" style="width: 100%; max-width: 600px; text-align: left;">
            <h2 style="text-align: center; color: white; margin-top: 0;">Exemplo</h2>
            <p style="text-align: center; color: #b0c4de; font-size: 0.9rem;">Exemplo</p>

            <form id="discord-form" class="contact-form">
                <input type="text" id="nome" class="glass-input" placeholder="Exemplo" required>
                <input type="email" id="email" class="glass-input" placeholder="Exemplo" required>
                <textarea id="mensagem" class="glass-input" placeholder="Exemplo" required></textarea>

                <button type="submit" class="btn-primary"
                    style="width: 100%; cursor: pointer; border: none; font-size: 1.1rem; padding: 15px;">
                    Exemplo
                </button>
            </form>
        </div>
        <section class="qa-section qa-contact">
            <div class="faq-container">
                <details class="faq-item">
                    <summary>Exemplo</summary>
                    <div class="faq-content">
                        <p>Exemplo</p>
                    </div>
                </details>
            </div>
        </section>

    </div>
    </div>
    <script defer src="layout.js"></script>
    <script defer src="script.js"></script>
    <script>
        document.getElementById('discord-form').addEventListener('submit', function (e) {
            e.preventDefault(); // Impede a página de recarregar

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const mensagem = document.getElementById('mensagem').value;
            const botao = document.querySelector('button[type="submit"]');

            // =========================================
            // COLE AQUI SEU WEBHOOK DO DISCORD
            // =========================================
            const webhookUrl = "COLE_SEU_WEBHOOK_AQUI"; // Exemplo: "https://discord.com/api/webhooks/..."

            // Muda o texto do botão para dar feedback ao usuário
            botao.innerHTML = '⏳ Enviando...';
            botao.style.opacity = '0.7';
            botao.disabled = true;

            // Formata a mensagem para o Discord
            const payload = {
                content: `🚨 **NOVO CONTATO PELO SITE!** 🚨\n\n**Nome:** ${nome}\n**E-mail:** ${email}\n**Mensagem:**\n> ${mensagem}`
            };

            // Envia os dados
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
                .then(response => {
                    if (response.ok) {
                        botao.innerHTML = '✅ Mensagem Enviada!';
                        botao.style.background = 'rgba(0, 255, 128, 0.4)'; // Fica verde
                        document.getElementById('discord-form').reset(); // Limpa os campos
                    } else {
                        throw new Error('Erro ao enviar');
                    }
                })
                .catch(error => {
                    botao.innerHTML = '❌ Erro ao enviar. Tente pelo e-mail.';
                    botao.style.background = 'rgba(255, 50, 50, 0.4)'; // Fica vermelho
                })
                .finally(() => {
                    // Restaura o botão depois de 4 segundos
                    setTimeout(() => {
                        botao.innerHTML = '🚀 Enviar Mensagem';
                        botao.style.opacity = '1';
                        botao.style.background = '';
                        botao.disabled = false;
                    }, 4000);
                });
        });
    </script>
</body>

</html>
